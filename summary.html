<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project HEAR — Order Summary</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1a8c5b;
      --green-light: #e8f7f0;
      --green-mid: #2db37a;
      --green-dark: #136644;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --text-soft: #9ca3af;
      --border: #e5e7eb;
      --bg: #f7f8f6;
      --white: #ffffff;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
    }

    /* Success header */
    .success-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .success-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--green), var(--green-mid));
    }

    .check-circle {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .check-circle svg {
      width: 26px; height: 26px;
      stroke: var(--green);
    }

    .success-title {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    /* Details card */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-soft);
      margin-bottom: 14px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 0;
    }

    .detail-row:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .detail-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .detail-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      text-align: right;
      max-width: 60%;
    }

    /* Total card */
    .total-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
    }

    .total-inner {
      background: var(--green-light);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .total-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--green-dark);
    }

    .total-value {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--green);
    }

    .btn-new {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--green);
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-new:hover { background: var(--green-dark); }
    .btn-new:active { transform: scale(0.98); }

    .btn-new svg {
      width: 15px; height: 15px;
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Success header -->
  <div class="success-card">
    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 class="success-title">Pre-order confirmed!</h1>
    <p class="success-sub">Thank you for supporting Project HEAR.<br>We'll be in touch with fulfillment details soon.</p>
  </div>

  <!-- Order details -->
  <div class="card">
    <div class="section-label">Order details</div>
    <div class="detail-row">
      <span class="detail-label">Customer</span>
      <span class="detail-value" id="displayName">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Product</span>
      <span class="detail-value" id="displayProduct">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Quantity</span>
      <span class="detail-value" id="displayQuantity">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Pickup method</span>
      <span class="detail-value" id="displayPickup">—</span>
    </div>
    <div class="detail-row" id="addressRow" style="display: none;">
      <span class="detail-label">Delivery address</span>
      <span class="detail-value" id="displayAddress">—</span>
    </div>
  </div>

  <!-- Total + CTA -->
  <div class="total-card">
    <div class="total-inner">
      <span class="total-label">Total amount</span>
      <span class="total-value" id="displayTotal">—</span>
    </div>
    <button class="btn-new" onclick="window.location.href='index.html'">
      Place another order
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>

</div>

<script>
  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }

  function extractPrice(str) {
    const m = str.match(/PHP\s?([\d,]+)/);
    return m ? parseInt(m[1].replace(/,/g, '')) : 0;
  }

  function displayOrderSummary() {
    const name     = getCookie('customerName');
    const product  = localStorage.getItem('product');
    const variant  = localStorage.getItem('variant');
    const quantity = localStorage.getItem('quantity');
    const pickup   = localStorage.getItem('pickup');
    const address  = localStorage.getItem('address');

    if (name)     document.getElementById('displayName').textContent = name;
    if (product)  document.getElementById('displayProduct').textContent = (variant ? variant + ' — ' : '') + product;
    if (quantity) document.getElementById('displayQuantity').textContent = quantity + (parseInt(quantity) > 1 ? ' units' : ' unit');
    if (pickup)   document.getElementById('displayPickup').textContent = pickup;

    if (product && quantity) {
      const total = extractPrice(product) * parseInt(quantity);
      document.getElementById('displayTotal').textContent = 'PHP ' + total.toLocaleString();
    }

    if (pickup === 'Delivery' && address) {
      document.getElementById('addressRow').style.display = 'flex';
      document.getElementById('displayAddress').textContent = address;
    }
  }

  window.addEventListener('load', displayOrderSummary);
</script>

</body>
</html>
